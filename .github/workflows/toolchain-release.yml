name: toolchain_release

on:
  workflow_dispatch:

concurrency:
  group: toolchain-release
  cancel-in-progress: false

jobs:
  toolchain_release:
    if: github.repository == 'mundak/ringos-ng'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build toolchain release container
        run: |
          docker build -f tools/toolchain/Dockerfile -t ringos-ci-toolchain-release .

      - name: Build and publish shared toolchain release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm \
            -e GH_TOKEN \
            -e GITHUB_REPOSITORY \
            -v "${RUNNER_TEMP}:/toolchain-output" \
            ringos-ci-toolchain-release \
            bash -lc "tools/toolchain/build-toolchain.sh --repo \"$GITHUB_REPOSITORY\" --output-dir /toolchain-output --publish"
