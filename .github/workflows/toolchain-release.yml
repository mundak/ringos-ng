name: toolchain_release

on:
  pull_request:
  push:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

concurrency:
  group: toolchain-release
  cancel-in-progress: false

jobs:
  toolchain_release:
    if: github.repository == 'mundak/ringos-ng'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            git \
            curl \
            python3

      - name: Validate shared toolchain bundle build
        if: github.event_name == 'pull_request' || github.ref != 'refs/heads/main'
        run: bash tools/toolchain/build-toolchain.sh

      - name: Publish shared toolchain release when missing
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash tools/toolchain/ensure-toolchain-release.sh --repo "$GITHUB_REPOSITORY" --publish-if-missing
