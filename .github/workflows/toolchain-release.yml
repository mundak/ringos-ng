name: toolchain_release

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

concurrency:
  group: toolchain-release
  cancel-in-progress: false

jobs:
  toolchain_release:
    if: github.repository == 'mundak/ringos-ng'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang \
            curl \
            gdb-multiarch \
            lld \
            llvm \
            qemu-system-arm \
            qemu-system-misc \
            qemu-system-x86

      - name: Publish shared toolchain release when missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash tools/toolchain/ensure-toolchain-release.sh --repo "$GITHUB_REPOSITORY" --allow-build --publish-if-missing
