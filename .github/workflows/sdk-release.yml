name: sdk_release

on:
  workflow_dispatch:

concurrency:
  group: sdk-release
  cancel-in-progress: false

jobs:
  sdk_release:
    if: github.repository == 'mundak/ringos-ng'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build SDK release container
        run: |
          docker build -f tools/toolchain/Dockerfile -t ringos-ci-sdk-release .

      - name: Build and publish shared SDK release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm \
            -e GH_TOKEN \
            -e GITHUB_REPOSITORY \
            -v "${RUNNER_TEMP}:/sdk-output" \
            ringos-ci-sdk-release \
            bash -lc "user/sdk/build-sdk.sh --repo \"$GITHUB_REPOSITORY\" --output-dir /sdk-output --publish"
