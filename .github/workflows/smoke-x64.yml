name: smoke_x64_native

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke_x64_native:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang \
            gdb-multiarch \
            lld \
            llvm \
            qemu-system-arm \
            qemu-system-misc \
            qemu-system-x86

      - name: Configure x64
        run: cmake --preset x64-debug

      - name: Build x64
        run: cmake --build --preset build-x64-debug

      - name: Run native x64 smoke test
        run: ctest --preset smoke_x64_native
