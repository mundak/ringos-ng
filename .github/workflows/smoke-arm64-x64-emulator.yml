name: smoke_arm64_x64_emulator

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke_arm64_x64_emulator:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang \
            gdb-multiarch \
            lld \
            llvm \
            qemu-system-arm \
            qemu-system-misc \
            qemu-system-x86

      - name: Configure arm64
        run: cmake --preset arm64-debug

      - name: Build arm64
        run: cmake --build --preset build-arm64-debug

      - name: Run emulated x64-on-arm64 smoke test
        run: ctest --preset smoke_arm64_x64_emulator
