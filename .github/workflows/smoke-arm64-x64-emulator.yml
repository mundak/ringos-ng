name: smoke_arm64_x64_emulator

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke_arm64_x64_emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        timeout-minutes: 10
        run: |
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y -o Acquire::Retries=3 \
            cmake \
            ninja-build \
            clang \
            curl \
            gdb-multiarch \
            lld \
            llvm \
            qemu-system-arm \
            qemu-system-misc \
            qemu-system-x86

      - name: Ensure shared toolchain bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash tools/toolchain/ensure-toolchain-release.sh --repo "$GITHUB_REPOSITORY" --allow-build

      - name: Configure arm64
        run: cmake --preset arm64-debug

      - name: Build arm64
        run: cmake --build --preset build-arm64-debug

      - name: Run emulated x64-on-arm64 smoke test
        run: ctest --preset smoke_arm64_x64_emulator
