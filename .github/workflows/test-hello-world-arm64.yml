name: test-hello-world-arm64

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: test-hello-world-arm64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test_hello_world_arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build sample test container
        run: |
          docker build -f tests/tests.Dockerfile -t ringos-sample-tests .

      - name: Run arm64 hello world sample test
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p "${RUNNER_TEMP}/ringos-build"

          docker run --rm \
            -e GH_TOKEN \
            -e GITHUB_REPOSITORY \
            -v "${RUNNER_TEMP}/ringos-build:/workspace/build" \
            ringos-sample-tests \
            bash -lc "user/samples/hello_world/test-hello-world-arm64.sh"
