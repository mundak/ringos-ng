name: sample_hello_world_cpp_arm64_x64_emulator

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  sample_hello_world_cpp_arm64_x64_emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        timeout-minutes: 10
        run: |
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y -o Acquire::Retries=3 \
            build-essential \
            cmake \
            ninja-build \
            curl \
            gdb-multiarch \
            qemu-system-arm \
            qemu-system-misc \
            qemu-system-x86

      - name: Ensure shared toolchain bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash tools/toolchain/ensure-toolchain-release.sh --repo "$GITHUB_REPOSITORY"

      - name: Configure arm64
        run: cmake --preset arm64-debug

      - name: Build hello_world_cpp arm64 x64-emulator target
        run: cmake --build --preset build-arm64-debug --target ringos_arm64_x64_emulator_hello_world_cpp

      - name: Run hello_world_cpp arm64 x64-emulator sample test
        run: ctest --preset sample_hello_world_cpp_arm64_x64_emulator
