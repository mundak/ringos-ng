name: x64_win32_loader_unit

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  x64_win32_loader_unit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang \
            curl \
            gdb-multiarch \
            lld \
            llvm \
            qemu-system-arm \
            qemu-system-misc \
            qemu-system-x86

      - name: Ensure shared toolchain bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash tools/toolchain/ensure-toolchain-release.sh --repo "$GITHUB_REPOSITORY" --allow-build

      - name: Configure x64
        run: cmake --preset x64-debug

      - name: Build x64
        run: cmake --build --preset build-x64-debug

      - name: Run x64 Win32 loader unit test
        run: ctest --preset x64_win32_loader_unit
